<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Questões - Redação - Megamind</title>
    <link rel="stylesheet" href="css/questionsStyle.css">
</head>
<body>
    <main class="dashboard-page simple-layout">
        <header class="simple-header">
            <a class="back-btn" href="index.html">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                    <path d="M19 12H5M12 19l-7-7 7-7" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
                Voltar
            </a>
            <h1>Redação</h1>
            <a class="profile-btn" href="perfil.html">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                    <circle cx="12" cy="8" r="3.2" fill="none" stroke="currentColor" stroke-width="1.8"/>
                    <path d="M6.5 19a5.5 5.5 0 0 1 11 0" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
                </svg>
            </a>

        <section class="question-page">
            <section class="subject-panel">
                <h2>Escolha um assunto</h2>
                <div class="subject-grid">
                    <a class="subject-card" href="#">
                        <span class="subject-icon red">▭</span>
                        <span class="subject-copy">
                            <strong>Estrutura da redação</strong>
                            <small>20 questões</small>
                            <span class="subject-progress-text">6 de 20</span>
                            <span class="progress-track"><span style="width: 30%;"></span></span>
                        </span>
                    </a>

                    <a class="subject-card" href="#">
                        <span class="subject-icon orange">⟷</span>
                        <span class="subject-copy">
                            <strong>Coesão e coerência</strong>
                            <small>18 questões</small>
                            <span class="subject-progress-text">3 de 18</span>
                            <span class="progress-track"><span style="width: 17%;"></span></span>
                        </span>
                    </a>

                    <a class="subject-card" href="#">
                        <span class="subject-icon yellow">◻</span>
                        <span class="subject-copy">
                            <strong>Argumentação</strong>
                            <small>25 questões</small>
                            <span class="subject-progress-text">5 de 25</span>
                            <span class="progress-track"><span style="width: 20%;"></span></span>
                        </span>
                    </a>

                    <a class="subject-card" href="#">
                        <span class="subject-icon blue">📝</span>
                        <span class="subject-copy">
                            <strong>Tipos de redação</strong>
                            <small>16 questões</small>
                            <span class="subject-progress-text">1 de 16</span>
                            <span class="progress-track"><span style="width: 6%;"></span></span>
                        </span>
                    </a>

                    <a class="subject-card" href="#">
                        <span class="subject-icon purple">✓</span>
                        <span class="subject-copy">
                            <strong>Adequação vocabular</strong>
                            <small>14 questões</small>
                            <span class="subject-progress-text">0 de 14</span>
                            <span class="progress-track"><span style="width: 0%;"></span></span>
                        </span>
                    </a>

                    <a class="subject-card" href="#">
                        <span class="subject-icon teal">✎</span>
                        <span class="subject-copy">
                            <strong>Revisão e correção</strong>
                            <small>22 questões</small>
                            <span class="subject-progress-text">4 de 22</span>
                            <span class="progress-track"><span style="width: 18%;"></span></span>
                        </span>
                    </a>
                </div>
            </section>
        </section>
    </main>
</body>
</html>
