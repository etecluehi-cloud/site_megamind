<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="/css/cad.css">
</head>
<body>
    
    <header>
        
        <div class="logo-container">
            <img src="../img/megamindlogo.png" class="MMLogo" alt="">
            <img src="../img/MegaMind.png" class="MMlogo" alt="">
        </div>

        <a class="navbar" href="/html/index.html">
            <h1 class="navbar">Login</h1>
        </a>

        <button onclick="MudarCor()" type="button" class="btnColor" >
        <img class="BackColor" id="iconeCor" src="../img/Lua.png" alt="">

    </header>

    <main>

        <div class="box">

            <h1 class="txtLogin">Cadastro</h1>

            <form class="form" action="/php/insertCad.php" method="POST">
                <label class="txtl">Nome</label>
                <input type="text" name="usuarioCad" id="usuarioCad" class="txtbox" required>

                <label class="txtl">E-mail</label>
                <input type="email" name="emailCad" id="emailCad" class="txtbox" required>

                <label class="txtl">Senha</label>

                <div class="input-container">
                    <input type="password" name="senhaCad" id="SenhaCad" class="txtbox" required>
                    <button type="button" class="btnEye" onclick="toggleSenha()">
                        <img id="IconeSenha" src="../img/invisivel.png" class="Eye">
                    </button>
                </div>

                <button type="submit" class="btnLogin">Cadastrar</button>
            </form>

        </div>

    </main>

    <footer>
        <img class="MMlogof" src="../img/MegaMindlf.png" alt="">
    </footer>

    <script src="../js/script.js"></script>

</body>
</html>
