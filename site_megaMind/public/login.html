<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <div class="box1">
        <img src="img/fundo.png" class="bg">
    </div>

    <div class="box2">
        <div class="box">
            

            <h1 class="txtLogin">Login</h1>

            <form class="form" onsubmit="event.preventDefault(); login();">

                <label class="txtl">E-mail</label>
                <input type="email" id="email" class="txtbox" required>

                <label class="txtl">Senha</label>

                <div class="input-container">
                    <input type="password" id="senha" class="txtbox" required>

                    <button type="button" class="btnEye" onclick="toggleSenha()">
                        <img id="IconeSenha" src="img/invisivel.png" class="Eye" alt="">
                    </button>
                </div>

                <button type="submit" class="btnlogin">
                    <span class="txtbtnLogin">Login</span>
                </button>

                <a class="RecSenha" href="ForgotKey.html">
                    <span style="color: #6c07ab;">Esqueceu a senha?</span>
                </a>

                <div class="cadastro">
                    <span>Não tem uma conta?</span>
                    <a class="cadlink" href="cad.html">Cadastre-se</a>
                </div>

            </form>

        </div>
    </div>

    <script type="module" src="js/auth.js"></script>

    <script>
        function toggleSenha() {
            const input = document.getElementById("senha");
            const icon = document.getElementById("IconeSenha");

            if (input.type === "password") {
                input.type = "text";
                icon.src = "img/visivel.png";
            } else {
                input.type = "password";
                icon.src = "img/invisivel.png";
            }
        }
    </script>

</body>
</html>
