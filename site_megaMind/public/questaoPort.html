<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Questões - Português - Megamind</title>
    <link rel="stylesheet" href="css/questionsStyle.css">
</head>
<body>
    <main class="dashboard-page simple-layout">
        <header class="simple-header">
            <a class="back-btn" href="index.html">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                    <path d="M19 12H5M12 19l-7-7 7-7" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
                Voltar
            </a>
            <h1>Português</h1>
            <a class="profile-btn" href="perfil.html">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                    <circle cx="12" cy="8" r="3.2" fill="none" stroke="currentColor" stroke-width="1.8"/>
                    <path d="M6.5 19a5.5 5.5 0 0 1 11 0" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
                </svg>
            </a>
        </header>

        <section class="question-page">
            <section class="subject-panel">
                <h2>Escolha um assunto</h2>
                <div class="subject-grid">
                    <a class="subject-card" href="#">
                        <span class="subject-icon red">A</span>
                        <span class="subject-copy">
                            <strong>Ortografia</strong>
                            <small>40 questões</small>
                            <span class="subject-progress-text">8 de 40</span>
                            <span class="progress-track"><span style="width: 20%;"></span></span>
                        </span>
                    </a>

                    <a class="subject-card" href="#">
                        <span class="subject-icon purple">´</span>
                        <span class="subject-copy">
                            <strong>Acentuação</strong>
                            <small>32 questões</small>
                            <span class="subject-progress-text">5 de 32</span>
                            <span class="progress-track"><span style="width: 16%;"></span></span>
                        </span>
                    </a>

                    <a class="subject-card" href="#">
                        <span class="subject-icon green">ABC</span>
                        <span class="subject-copy">
                            <strong>Gramática</strong>
                            <small>55 questões</small>
                            <span class="subject-progress-text">11 de 55</span>
                            <span class="progress-track"><span style="width: 20%;"></span></span>
                        </span>
                    </a>

                    <a class="subject-card" href="#">
                        <span class="subject-icon blue">📖</span>
                        <span class="subject-copy">
                            <strong>Interpretação de textos</strong>
                            <small>30 questões</small>
                            <span class="subject-progress-text">3 de 30</span>
                            <span class="progress-track"><span style="width: 10%;"></span></span>
                        </span>
                    </a>

                    <a class="subject-card" href="#">
                        <span class="subject-icon yellow">✎</span>
                        <span class="subject-copy">
                            <strong>Literatura</strong>
                            <small>24 questões</small>
                            <span class="subject-progress-text">0 de 24</span>
                            <span class="progress-track"><span style="width: 0%;"></span></span>
                        </span>
                    </a>

                    <a class="subject-card" href="#">
                        <span class="subject-icon teal">≈</span>
                        <span class="subject-copy">
                            <strong>Fonética e fonologia</strong>
                            <small>18 questões</small>
                            <span class="subject-progress-text">2 de 18</span>
                            <span class="progress-track"><span style="width: 11%;"></span></span>
                        </span>
                    </a>
                </div>
            </section>
        </section>
    </main>
</body>
</html>
