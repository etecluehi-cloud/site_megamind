<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Questões - Matemática - Megamind</title>
    <link rel="stylesheet" href="css/questionsStyle.css">
</head>
<body>
    <main class="dashboard-page simple-layout">
        <header class="simple-header">
            <a class="back-btn" href="index.html">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                    <path d="M19 12H5M12 19l-7-7 7-7" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
                Voltar
            </a>
            <h1>Matemática</h1>
            <a class="profile-btn" href="perfil.html">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                    <circle cx="12" cy="8" r="3.2" fill="none" stroke="currentColor" stroke-width="1.8"/>
                    <path d="M6.5 19a5.5 5.5 0 0 1 11 0" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
                </svg>
            </a>
        </header>

        <section class="question-page">
            <section class="subject-panel">
                <h2>Escolha um assunto</h2>
                <div class="subject-grid">
                    <a class="subject-card" href="#">
                        <span class="subject-icon red">2+2</span>
                        <span class="subject-copy">
                            <strong>Matemática básica</strong>
                            <small>70 questões</small>
                            <span class="subject-progress-text">2 de 70</span>
                            <span class="progress-track"><span style="width: 3%;"></span></span>
                        </span>
                    </a>

                    <a class="subject-card" href="#">
                        <span class="subject-icon teal">∩</span>
                        <span class="subject-copy">
                            <strong>Conjuntos</strong>
                            <small>25 questões</small>
                            <span class="subject-progress-text">0 de 25</span>
                            <span class="progress-track"><span style="width: 0%;"></span></span>
                        </span>
                    </a>

                    <a class="subject-card" href="#">
                        <span class="subject-icon green">1,3,9</span>
                        <span class="subject-copy">
                            <strong>Progressões</strong>
                            <small>15 questões</small>
                            <span class="subject-progress-text">1 de 15</span>
                            <span class="progress-track"><span style="width: 7%;"></span></span>
                        </span>
                    </a>

                    <a class="subject-card" href="#">
                        <span class="subject-icon blue">⬡</span>
                        <span class="subject-copy">
                            <strong>Geometria plana</strong>
                            <small>30 questões</small>
                            <span class="subject-progress-text">0 de 30</span>
                            <span class="progress-track"><span style="width: 0%;"></span></span>
                        </span>
                    </a>

                    <a class="subject-card" href="#">
                        <span class="subject-icon yellow">○</span>
                        <span class="subject-copy">
                            <strong>Geometria de posição</strong>
                            <small>7 questões</small>
                            <span class="subject-progress-text">0 de 7</span>
                            <span class="progress-track"><span style="width: 0%;"></span></span>
                        </span>
                    </a>

                    <a class="subject-card" href="#">
                        <span class="subject-icon pink">△</span>
                        <span class="subject-copy">
                            <strong>Geometria espacial</strong>
                            <small>25 questões</small>
                            <span class="subject-progress-text">0 de 25</span>
                            <span class="progress-track"><span style="width: 0%;"></span></span>
                        </span>
                    </a>
                </div>
            </section>
        </section>
    </main>
</body>
</html>
