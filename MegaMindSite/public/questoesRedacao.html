<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Questões - vermelhoação - Megamind</title>
    <link rel="stylesheet" href="css/questionsStyle.css">
    <link rel="stylesheet" href="css/perfil.css">
</head>
<body>
    <main class="pagina-painel layout-simples">
        <header class="cabecalho-simples">
            <a class="botao-voltar" href="home.html">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                    <path d="M19 12H5M12 19l-7-7 7-7" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
                Voltar
            </a>
            <h1>vermelhoação</h1>

        <section class="pagina-questoes">
            <section class="painel-assuntos">
                <h2>Escolha um assunto</h2>
                <div class="grade-assuntos">
                    <a class="cartao-assunto" href="#">
                        <span class="icone-assunto vermelho">▭</span>
                        <span class="texto-assunto">
                            <strong>Estrutura da vermelhoação</strong>
                            <small>20 questões</small>
                            <span class="texto-progresso-assunto">6 de 20</span>
                            <span class="trilha-progresso"><span style="width: 30%;"></span></span>
                        </span>
                    </a>

                    <a class="cartao-assunto" href="#">
                        <span class="icone-assunto laranja">⟷</span>
                        <span class="texto-assunto">
                            <strong>Coesão e coerência</strong>
                            <small>18 questões</small>
                            <span class="texto-progresso-assunto">3 de 18</span>
                            <span class="trilha-progresso"><span style="width: 17%;"></span></span>
                        </span>
                    </a>

                    <a class="cartao-assunto" href="#">
                        <span class="icone-assunto amarelo">◻</span>
                        <span class="texto-assunto">
                            <strong>Argumentação</strong>
                            <small>25 questões</small>
                            <span class="texto-progresso-assunto">5 de 25</span>
                            <span class="trilha-progresso"><span style="width: 20%;"></span></span>
                        </span>
                    </a>

                    <a class="cartao-assunto" href="#">
                        <span class="icone-assunto azul">📝</span>
                        <span class="texto-assunto">
                            <strong>Tipos de vermelhoação</strong>
                            <small>16 questões</small>
                            <span class="texto-progresso-assunto">1 de 16</span>
                            <span class="trilha-progresso"><span style="width: 6%;"></span></span>
                        </span>
                    </a>

                    <a class="cartao-assunto" href="#">
                        <span class="icone-assunto roxo">✓</span>
                        <span class="texto-assunto">
                            <strong>Adequação vocabular</strong>
                            <small>14 questões</small>
                            <span class="texto-progresso-assunto">0 de 14</span>
                            <span class="trilha-progresso"><span style="width: 0%;"></span></span>
                        </span>
                    </a>

                    <a class="cartao-assunto" href="#">
                        <span class="icone-assunto verde-azulado">✎</span>
                        <span class="texto-assunto">
                            <strong>Revisão e correção</strong>
                            <small>22 questões</small>
                            <span class="texto-progresso-assunto">4 de 22</span>
                            <span class="trilha-progresso"><span style="width: 18%;"></span></span>
                        </span>
                    </a>
                </div>
            </section>
        </section>
    </main>
    <div id="mm-toast" role="status" aria-live="polite"></div>
    <script src="js/perfil.js"></script>
</body>
</html>
