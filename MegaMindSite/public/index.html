<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Google+Sans+Code:ital,wght,MONO@0,300..800,1;1,300..800,1&family=Momo+Trust+Display&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Stack+Sans+Headline:wght@200..700&family=TikTok+Sans:opsz,wght@12..36,300..900&family=Vend+Sans:ital,wght@0,300..700;1,300..700&display=swap" rel="stylesheet">
</head>
<body>

    <div class="box1">
        <img src="img/fundo.png" class="bg">
    </div>

    <div class="box2">
        <div class="box">
            

            <h1 class="txtLogin">Login</h1>

            <form class="form" onsubmit="event.preventDefault(); login();">

                <label class="txtl">E-mail</label>
                <input type="email" id="email" class="txtbox" required>

                <label class="txtl">Senha</label>

                <div class="input-container">
                    <input type="password" id="senha" class="txtbox" required>

                    <button type="button" class="btnEye" onclick="toggleSenha()">
                        <img id="IconeSenha" src="img/invisivel.png" class="Eye" alt="">
                    </button>
                </div>

                <button type="submit" class="btnlogin">
                    <span class="txtbtnLogin">Login</span>
                </button>

                <a class="RecSenha" href="ForgotKey.html">
                    <span style="color: #6c07ab;">Esqueceu a senha?</span>
                </a>

                <div class="cadastro">
                    <span>Não tem uma conta?</span>
                    <a class="cadlink" href="cad.html">Cadastre-se</a>
                </div>

            </form>

        </div>
    </div>

    <script type="module" src="js/auth.js"></script>

    <script src="js/script.js"></script>
</body>
</html>
