<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Português – Megamind</title>
    <link rel="stylesheet" href="css/transicao.css">
    <script src="js/transicao.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/conteudo-matematica.css">
    <script src="js/perfil.js" defer></script>
    <script type="module" src="js/conteudo-portugues.js"></script>
</head>
<body>

    <header class="topo">
        <a class="btn-voltar" href="home.html">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                 stroke-linecap="round" stroke-linejoin="round" width="18" height="18">
                <path d="M19 12H5M12 19l-7-7 7-7"/>
            </svg>
            Voltar
        </a>
        <div class="topo-centro">
            <span class="topo-materia">Português</span>
            <h1 class="topo-titulo">Escolha um conteúdo</h1>
        </div>
        <div class="topo-deco" aria-hidden="true">Aa</div>
    </header>

    <main class="pagina">
        <div class="grade" id="grade-conteudos">
            <div class="card-skeleton"></div>
            <div class="card-skeleton"></div>
            <div class="card-skeleton"></div>
            <div class="card-skeleton"></div>
            <div class="card-skeleton"></div>
            <div class="card-skeleton"></div>
            <div class="card-skeleton"></div>
        </div>
    </main>

    <div id="modal-overlay" class="modal-overlay"></div>

    <aside id="modal" class="modal" role="dialog" aria-modal="true" aria-labelledby="modal-titulo">
        <div class="modal-inner">
            <button class="modal-fechar" id="modal-fechar" aria-label="Fechar">✕</button>
            <h2 id="modal-titulo" class="modal-titulo"></h2>
            <p  id="modal-resumo"  class="modal-resumo"></p>
            <div class="modal-secao-label">Vídeos</div>
            <div id="modal-videos" class="modal-videos"></div>
            <button id="modal-btn-questoes" class="btn-questoes" disabled>
                Ir para as Questões →
            </button>
        </div>
    </aside>

    <div id="mm-toast" role="status" aria-live="polite"></div>

</body>
</html>
