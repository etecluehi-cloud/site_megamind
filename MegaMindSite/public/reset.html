<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redefinir Senha</title>
    <link rel="stylesheet" href="css/style.css">

    <link rel="stylesheet" href="css/transicao.css">
    <script src="js/transicao.js"></script>
    
    <style>
        /* ── Força de senha ── */
        .forca-container {
            display: none;
            margin-top: 8px;
            margin-bottom: 12px;
        }

        .forca-barras {
            display: flex;
            gap: 6px;
            margin-bottom: 5px;
        }

        .barra {
            flex: 1;
            height: 5px;
            border-radius: 4px;
            background: #ddd;
            transition: background 0.3s;
        }

        .forca-label {
            font-size: 12px;
            font-weight: 600;
            display: block;
            margin-bottom: 6px;
        }

        .criterios {
            list-style: none;
            padding: 0;
            margin: 0;
            font-size: 12px;
        }

        .criterios li {
            color: #999;
            margin-bottom: 3px;
            transition: color 0.2s;
        }

        .criterios li.ok {
            color: #4caf50;
        }
    </style>
</head>
<body>

    <div class="box1">
        <img src="img/fundo.png" class="bg">
    </div>

    <div class="box2">

        <div class="box">

            <div class="organização">

                <a class="voltar" href="index.html">
                    <button type="submit" class="btnVoltar">
                        <img class="imgVoltar" src="img/voltar.png" alt="">
                    </button>
                </a>

                <h1 class="txtLogin">Redefinir Senha</h1>

            </div>

            <form class="form" onsubmit="return false;">

                <label class="txtl">Digite a nova senha</label>

                <div class="input-container">
                    <input type="password" id="newPassword" placeholder="Nova senha" class="txtbox" required oninput="verificarSenha()">
                    <button type="button" class="btnEye" onclick="toggleSenha()">
                        <img id="IconeSenha" src="../img/invisivel.png" class="Eye" alt="">
                    </button>
                </div>

                <!-- INDICADOR DE FORÇA DE SENHA -->
                <div class="forca-container" id="forcaContainer">
                    <div class="forca-barras">
                        <div class="barra" id="barra1"></div>
                        <div class="barra" id="barra2"></div>
                        <div class="barra" id="barra3"></div>
                        <div class="barra" id="barra4"></div>
                    </div>
                    <span class="forca-label" id="forcaLabel"></span>

                    <ul class="criterios">
                        <li id="c-tamanho">✗ Mínimo 8 caracteres</li>
                        <li id="c-maiuscula">✗ Uma letra maiúscula</li>
                        <li id="c-numero">✗ Um número</li>
                        <li id="c-simbolo">✗ Um símbolo (!@#$...)</li>
                    </ul>
                </div>

                <button id="btnReset" class="btnlogin">
                    <span class="txtbtnLogin">Salvar</span>
                </button>

            </form>

        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js"></script>

    <script type="module" src="js/reset.js"></script>

</body>
</html>
