<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Redefinir Senha</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Momo+Trust+Display&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/transicao.css">
  <script src="js/transicao.js"></script>

  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, sans-serif;
      color: #24152f;
      background: linear-gradient(135deg, #f8efff 0%, #ffffff 48%, #f3e6ff 100%);
    }

    .reset-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 28px;
    }

    .reset-card {
      width: 100%;
      max-width: 420px;
      padding: 34px 32px;
      border-radius: 22px;
      background: #fff;
      box-shadow: 0 20px 55px rgba(92, 22, 145, 0.16);
      border: 1px solid #eadcf6;
    }

    .reset-back {
      width: 46px;
      height: 46px;
      border: 0;
      border-radius: 50%;
      background: #831fd2;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      margin-bottom: 20px;
      box-shadow: 0 12px 24px rgba(131, 31, 210, 0.24);
    }

    .reset-back img {
      width: 24px;
      height: 24px;
      object-fit: contain;
    }

    h1 {
      margin: 0;
      color: #281137;
      font-family: "Momo Trust Display", Arial, sans-serif;
      font-size: 36px;
      line-height: 1;
      font-weight: 900;
      text-shadow: 0.6px 0 currentColor;
    }

    .reset-subtitle {
      margin: 10px 0 26px;
      color: #75657f;
      font-size: 14px;
      line-height: 1.45;
    }

    .reset-form {
      display: flex;
      flex-direction: column;
      gap: 13px;
    }

    label {
      font-size: 14px;
      font-weight: 700;
      color: #281137;
    }

    .reset-input {
      width: 100%;
      height: 52px;
      border-radius: 13px;
      border: 1px solid #d8b9ee;
      padding: 0 15px;
      outline: none;
      background: #fff;
      color: #281137;
      font-size: 15px;
      transition: border 0.2s ease, box-shadow 0.2s ease;
    }

    .reset-input:focus {
      border-color: #8a25d8;
      box-shadow: 0 0 0 4px rgba(138, 37, 216, 0.12);
    }

    .forca-container {
      display: none;
      padding: 12px 13px;
      border-radius: 13px;
      background: #fbf7ff;
      border: 1px solid #eadcf6;
    }

    .forca-barras {
      display: flex;
      gap: 6px;
      margin-bottom: 8px;
    }

    .barra {
      flex: 1;
      height: 6px;
      border-radius: 999px;
      background: #ded5e8;
      transition: background 0.3s;
    }

    .forca-label {
      display: block;
      margin-bottom: 8px;
      font-size: 13px;
      font-weight: 800;
    }

    .criterios {
      list-style: none;
      padding: 0;
      margin: 0;
      display: grid;
      gap: 5px;
      font-size: 12px;
    }

    .criterios li { color: #807187; }
    .criterios li.ok { color: #26894c; font-weight: 700; }

    .reset-submit {
      width: 100%;
      height: 52px;
      margin-top: 4px;
      border: 0;
      border-radius: 13px;
      background: linear-gradient(135deg, #8520d4, #b24af1);
      color: #fff;
      font-family: "Momo Trust Display", Arial, sans-serif;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
      box-shadow: 0 16px 28px rgba(132, 32, 212, 0.24);
    }

    @media (max-width: 520px) {
      .reset-page { padding: 18px; align-items: flex-start; }
      .reset-card { padding: 28px 22px; margin-top: 24px; }
      h1 { font-size: 31px; }
    }
  </style>
</head>
<body>
  <main class="reset-page">
    <section class="reset-card" aria-label="Redefinir senha">
      <a href="index.html" aria-label="Voltar para o login">
        <button type="button" class="reset-back">
          <img src="img/voltar.png" alt="">
        </button>
      </a>

      <h1>Redefinir Senha</h1>
      <p class="reset-subtitle">Digite uma nova senha segura para acessar sua conta.</p>

      <form class="reset-form" onsubmit="return false;">
        <label for="newPassword">Nova senha</label>
        <input type="password" id="newPassword" placeholder="Digite sua nova senha" class="reset-input" required oninput="verificarSenha()">

        <div class="forca-container" id="forcaContainer">
          <div class="forca-barras">
            <div class="barra" id="barra1"></div>
            <div class="barra" id="barra2"></div>
            <div class="barra" id="barra3"></div>
            <div class="barra" id="barra4"></div>
          </div>
          <span class="forca-label" id="forcaLabel"></span>

          <ul class="criterios">
            <li id="c-tamanho">Falta - Mínimo 8 caracteres</li>
            <li id="c-maiuscula">Falta - Uma letra maiúscula</li>
            <li id="c-numero">Falta - Um número</li>
            <li id="c-simbolo">Falta - Um símbolo (!@#$...)</li>
          </ul>
        </div>

        <button id="btnReset" class="reset-submit" type="button">Salvar senha</button>
      </form>
    </section>
  </main>

  <script type="module" src="js/reset.js"></script>
</body>
</html>
