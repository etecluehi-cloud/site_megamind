                    <a class="link-lateral" href="adm-gerenciar-dashboard.html">

                <div class="container-form-adm">
                    <form id="form-cadastro-admin" class="form-cadastro-adm" action="#" method="POST">
                        
                        <div class="grupo-form">
                            <label for="nome-admin" class="label-form">Nome Completo</label>
                            <input 
                                type="text" 
                                id="nome-admin" 
                                name="nome" 
                                class="input-form" 
                                placeholder="Ex: JoÃ£o Silva"

                                placeholder="Ex: joao@megamind.com"

                        <div class="grupo-form">

                                </button>
                            </div>
                        </div>

                        <div class="grupo-form">
                            <label for="confirmacao-admin" class="label-form">Confirmar Senha</label>
                            <div class="input-container">
                                <input 
                                    type="password" 
                                    id="confirmacao-admin" 
                                    name="confirmacao" 
                                    class="input-form" 
                                    placeholder="Confirme a senha"
                                    required

                            </div>
                        </div>

                        <div class="grupo-form">
                            <label for="cargo-admin" class="label-form">Cargo/PermissÃ£o</label>
                            <select id="cargo-admin" name="cargo" class="input-form" required>
                                <option value="">Selecione um cargo</option>

                                <option value="moderador">Moderador</option>

                                    <th>Nome</th>
                                    <th>E-mail</th>
                                    <th>Cargo</th>
                                    <th>Data Cadastro</th>
                                    <th>AÃ§Ãµes</th>

                            <tbody id="corpo-tabela">

                                </tr>
                            </tbody>
