<html lang="pt-br">
<head>

</head>

<body>

    <div class="areaImagem">

    </div>

    <div class="areaFormulario">

        <div class="boxFormulario">

            <div class="cabecalhoPagina">

                <a class="linkVoltar" href="index.html">

                    <button type="submit" class="btnVoltar">
                        <img class="imgVoltar" src="img/voltar.png" alt="">
                    </button>

                </a>

                <h1 class="tituloPagina">Recuperar Senha</h1>

            </div>

            <form class="formulario" onsubmit="return false;">

                <label class="lblCampo">
                    Digite o e-mail cadastrado
                </label>

                <input
                    type="email"
                    id="email"
                    class="inputTexto"
                    required
                >

                <button
                    onclick="recuperarSenha()"
                    type="button"
                    class="btnPrincipal"
                >

                </button>

            </form>

        </div>

    </div>

    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js"></script>

</body>
