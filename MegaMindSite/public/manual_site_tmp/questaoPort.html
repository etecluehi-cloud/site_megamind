
<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <base href="../">
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Questões – Português</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />

  
  
  

  <style>
    :root {
      --bg:         #F4F2FA;
      --card:       #FFFFFF;
      --border:     rgba(123,47,190,.13);
      --purple:     #7B2FBE;
      --purple-l:   #9D55D4;
      --purple-bg:  #F0E8FA;
      --purple-icon:linear-gradient(135deg, #7B2FBE 0%, #9D55D4 100%);
      --green:      #16A34A;
      --green-bg:   #F0FDF4;
      --red:        #DC2626;
      --red-bg:     #FEF2F2;
      --text:       #1A1A2E;
      --muted:      #6B7280;
      --radius:     14px;
      --radius-sm:  10px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    .screen { display: none; }
    .screen.active { display: block; }

    /* ── HEADER ── */
    .topbar {
      background: #FFFFFF;
      border-bottom: 1px solid rgba(123,47,190,.1);
      padding: 0 24px;
      height: 64px;
      display: flex;
      align-items: center;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .topbar-left  { width: 120px; display: flex; align-items: center; }
    .topbar-right { width: 120px; }
    .topbar-center {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      line-height: 1.2;
    }
    .topbar-label {
      font-size: .65rem;
      font-weight: 700;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: var(--purple);
    }
    .topbar-title {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 1.05rem;
      font-weight: 700;
      color: var(--text);
    }
    .topbar-back {
      display: flex;
      align-items: center;
      gap: 6px;
      background: none;
      border: none;
      cursor: pointer;
      color: var(--purple);
      font-family: 'Inter', sans-serif;
      font-size: .88rem;
      font-weight: 600;
      padding: 6px 12px 6px 8px;
      border-radius: 8px;
      transition: background .15s;
    }
    .topbar-back:hover { background: var(--purple-bg); }

    /* ── TELA 1: MATÉRIAS ── */
    #screen-materias-content {
      max-width: 1080px;
      margin: 0 auto;
      padding: 36px 24px 60px;
    }
    .cards-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
    }
    @media (max-width: 860px) { .cards-grid { grid-template-columns: repeat(2, 1fr); } }
    @media (max-width: 520px) { .cards-grid { grid-template-columns: 1fr; } }

    .mat-card {
      background: #FFFFFF;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px 18px 16px;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      transition: box-shadow .2s, border-color .2s, transform .2s;
    }
    .mat-card:hover {
      box-shadow: 0 6px 24px rgba(123,47,190,.13);
      border-color: rgba(123,47,190,.3);
      transform: translateY(-2px);
    }
    .mat-card-top {
      display: flex;
      align-items: flex-start;
      gap: 14px;
      margin-bottom: 12px;
    }
    .mat-card-icon {
      width: 44px; height: 44px;
      border-radius: 11px;
      background: var(--purple-icon);
      display: flex; align-items: center; justify-content: center;
      font-size: 1.2rem;
      flex-shrink: 0;
    }
    .mat-card-text  { flex: 1; min-width: 0; }
    .mat-card-name  {
      font-family: 'Space Grotesk', sans-serif;
      font-size: .97rem;
      font-weight: 600;
      color: var(--text);
      line-height: 1.3;
      margin-bottom: 3px;
    }
    .mat-card-desc  { font-size: .78rem; color: var(--muted); line-height: 1.4; }
    .mat-card-divider { height: 1px; background: rgba(123,47,190,.1); margin-bottom: 10px; }
    .mat-card-meta  { font-size: .72rem; color: var(--muted); }

    /* ── TELA 2: QUESTÕES ── */
    #screen-questoes-content {
      max-width: 720px;
      margin: 0 auto;
      padding: 32px 24px 60px;
    }
    .progress-bar-wrap {
      background: rgba(123,47,190,.1);
      border-radius: 100px;
      height: 5px;
      margin-bottom: 24px;
      overflow: hidden;
    }
    .progress-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--purple), var(--purple-l));
      border-radius: 100px;
      transition: width .5s cubic-bezier(.4,0,.2,1);
      width: 0%;
    }
    .q-meta {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 18px;
    }
    .q-counter {
      font-size: .75rem;
      font-weight: 600;
      color: var(--purple);
      background: var(--purple-bg);
      border: 1px solid rgba(123,47,190,.2);
      border-radius: 20px;
      padding: 4px 14px;
    }
    .q-subtitulo { font-size: .78rem; color: var(--muted); }

    .q-card {
      background: #FFFFFF;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 26px;
      margin-bottom: 14px;
    }
    .q-enunciado { font-size: .97rem; line-height: 1.75; color: var(--text); }

    .alternativas { display: flex; flex-direction: column; gap: 9px; }
    .alt-btn {
      background: #FFFFFF;
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 13px 16px;
      color: var(--text);
      font-family: 'Inter', sans-serif;
      font-size: .92rem;
      text-align: left;
      cursor: pointer;
      transition: background .15s, border-color .15s, transform .12s;
      display: flex;
      align-items: flex-start;
      gap: 12px;
      line-height: 1.5;
    }
    .alt-btn:hover:not(:disabled) { background: var(--purple-bg); border-color: var(--purple); transform: translateX(3px); }
    .alt-btn:disabled { cursor: default; transform: none; }
    .alt-letra {
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 700;
      font-size: .82rem;
      color: var(--purple);
      min-width: 20px;
      margin-top: 1px;
    }
    .alt-btn.correta { background: var(--green-bg); border-color: var(--green); }
    .alt-btn.correta .alt-letra { color: var(--green); }
    .alt-btn.errada  { background: var(--red-bg);   border-color: var(--red); }
    .alt-btn.errada  .alt-letra { color: var(--red); }

    .feedback-box {
      border-radius: var(--radius-sm);
      padding: 13px 16px;
      font-size: .86rem;
      font-weight: 600;
      display: none;
      align-items: center;
      gap: 9px;
      margin-top: 12px;
    }
    .feedback-box.show   { display: flex; }
    .feedback-box.acerto { background: var(--green-bg); border: 1px solid rgba(22,163,74,.22);  color: var(--green); }
    .feedback-box.erro   { background: var(--red-bg);   border: 1px solid rgba(220,38,38,.18); color: var(--red); }

    .btn-proxima {
      display: none;
      width: 100%;
      margin-top: 14px;
      padding: 15px;
      background: var(--purple);
      border: none;
      border-radius: var(--radius-sm);
      color: #fff;
      font-family: 'Space Grotesk', sans-serif;
      font-size: .97rem;
      font-weight: 700;
      cursor: pointer;
      letter-spacing: .02em;
      transition: opacity .18s, transform .14s;
    }
    .btn-proxima.show  { display: block; }
    .btn-proxima:hover { opacity: .88; transform: translateY(-1px); }

    .loading { text-align: center; padding: 56px 0; color: var(--muted); font-size: .92rem; }
    .spinner {
      width: 36px; height: 36px;
      border: 3px solid rgba(123,47,190,.12);
      border-top-color: var(--purple);
      border-radius: 50%;
      animation: spin .75s linear infinite;
      margin: 0 auto 14px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── TELA 3: RESULTADO ── */
    #screen-resultado-content {
      max-width: 500px;
      margin: 0 auto;
      padding: 48px 24px 60px;
      text-align: center;
    }
    .result-emoji { font-size: 3.6rem; margin-bottom: 10px; }
    .result-title {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 1.7rem;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 5px;
    }
    .result-sub { color: var(--muted); font-size: .88rem; margin-bottom: 28px; }
    .result-stats { display: flex; gap: 14px; justify-content: center; margin-bottom: 20px; }
    .stat-box {
      flex: 1; max-width: 130px;
      background: #FFFFFF;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 18px 14px;
    }
    .stat-box .num {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 2rem; font-weight: 700;
      line-height: 1; margin-bottom: 4px;
    }
    .stat-box .lbl { font-size: .72rem; color: var(--muted); }
    .stat-box.acertos .num { color: var(--green); }
    .stat-box.erros   .num { color: var(--red); }
    .stat-box.total   .num { color: var(--purple); }
    .result-bar-wrap {
      background: rgba(123,47,190,.08);
      border-radius: 100px; height: 8px;
      margin-bottom: 22px; overflow: hidden;
    }
    .result-bar-fill {
      height: 100%; border-radius: 100px;
      background: linear-gradient(90deg, var(--purple), var(--green));
      transition: width 1s ease;
    }
    .result-msg {
      color: var(--muted); font-size: .88rem;
      margin-bottom: 24px; padding: 14px 18px;
      background: #FFFFFF; border-radius: var(--radius-sm);
      border: 1px solid var(--border); line-height: 1.6; text-align: left;
    }
    .result-msg strong { color: var(--text); }
    .btn-voltar-mat {
      width: 100%; padding: 15px;
      background: var(--purple); border: none;
      border-radius: var(--radius-sm); color: #fff;
      font-family: 'Space Grotesk', sans-serif;
      font-size: .97rem; font-weight: 700;
      cursor: pointer; letter-spacing: .02em;
      transition: opacity .18s;
    }
    .btn-voltar-mat:hover { opacity: .88; }

    .toast {
      position: fixed; bottom: 28px; left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: #1A1A2E; color: #fff;
      padding: 11px 22px; border-radius: 100px;
      font-size: .86rem; font-weight: 500;
      box-shadow: 0 6px 24px rgba(0,0,0,.18);
      transition: transform .28s; z-index: 999; white-space: nowrap;
    }
    .toast.show { transform: translateX(-50%) translateY(0); }
  </style>
</head>
<body>

<!-- ══ TELA 1: MATÉRIAS ══════════════════════════════════════ -->
<div id="screen-materias" class="screen active">
  <header class="topbar">
    <div class="topbar-left">
      <button class="topbar-back" onclick="window.location.href='home.html'">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
        Voltar
      </button>
    </div>
    <div class="topbar-center">
      <span class="topbar-label">PORTUGUÊS</span>
      <span class="topbar-title">Escolha um conteúdo</span>
    </div>
    <div class="topbar-right"></div>
  </header>

  <div id="screen-materias-content">
    <div class="cards-grid" id="cards-container"></div>
  </div>
</div>

<!-- ══ TELA 2: QUESTÕES ══════════════════════════════════════ -->
<div id="screen-questoes" class="screen">
  <header class="topbar">
    <div class="topbar-left">
      <button class="topbar-back" id="btn-back-questoes">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
        Voltar
      </button>
    </div>
    <div class="topbar-center">
      <span class="topbar-label">PORTUGUÊS</span>
      <span class="topbar-title" id="topbar-materia-nome">Questões</span>
    </div>
    <div class="topbar-right"></div>
  </header>

  <div id="screen-questoes-content">
    <div class="progress-bar-wrap">
      <div class="progress-bar-fill" id="progress-fill"></div>
    </div>
    <div class="q-meta">
      <span class="q-counter" id="q-counter">Questão 1 de 5</span>
      <span class="q-subtitulo" id="q-subtitulo"></span>
    </div>

    <div id="loading-questoes" class="loading">
      <div class="spinner"></div>
      Carregando questões…
    </div>

    <div id="questao-wrap" style="display:none">
      <div class="q-card">
        <div class="q-enunciado" id="q-enunciado"></div>
      </div>
      <div class="alternativas" id="alternativas-wrap"></div>
      <div class="feedback-box" id="feedback-box">
        <span id="feedback-icon"></span>
        <span id="feedback-txt"></span>
      </div>
      <button class="btn-proxima" id="btn-proxima">Próxima questão →</button>
    </div>
  </div>
</div>

<!-- ══ TELA 3: RESULTADO ══════════════════════════════════════ -->
<div id="screen-resultado" class="screen">
  <header class="topbar">
    <div class="topbar-left">
      <button class="topbar-back" id="btn-back-resultado">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
        Voltar
      </button>
    </div>
    <div class="topbar-center">
      <span class="topbar-label">PORTUGUÊS</span>
      <span class="topbar-title">Resultado</span>
    </div>
    <div class="topbar-right"></div>
  </header>

  <div id="screen-resultado-content">
    <div class="result-emoji" id="result-emoji">🎯</div>
    <div class="result-title" id="result-title">Bloco Concluído!</div>
    <div class="result-sub"   id="result-sub"></div>
    <div class="result-stats">
      <div class="stat-box acertos"><div class="num" id="res-acertos">0</div><div class="lbl">Acertos</div></div>
      <div class="stat-box erros">  <div class="num" id="res-erros">0</div>  <div class="lbl">Erros</div></div>
      <div class="stat-box total">  <div class="num" id="res-total">5</div>  <div class="lbl">Questões</div></div>
    </div>
    <div class="result-bar-wrap">
      <div class="result-bar-fill" id="result-bar" style="width:0%"></div>
    </div>
    <div class="result-msg" id="result-msg"></div>
    <button class="btn-voltar-mat" id="btn-voltar-materias">← Voltar às matérias</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
document.addEventListener('DOMContentLoaded', function(){
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  const tela = document.getElementById('screen-questoes');
  if (tela) tela.classList.add('active');
  const loading = document.getElementById('loading-questoes');
  if (loading) loading.style.display = 'none';
  const wrap = document.getElementById('questao-wrap');
  if (wrap) wrap.style.display = 'block';
  const fill = document.getElementById('progress-fill');
  if (fill) fill.style.width = '20%';
  const nome = document.getElementById('topbar-materia-nome');
  if (nome) nome.textContent = 'Questoes';
  const sub = document.getElementById('q-subtitulo');
  if (sub) sub.textContent = 'Exemplo de questao';
  const en = document.getElementById('q-enunciado');
  if (en) en.textContent = 'Leia o enunciado da questao e escolha uma das alternativas disponiveis. O sistema registra a resposta e mostra o avanco do bloco de estudo.';
  const alts = document.getElementById('alternativas-wrap');
  if (alts) alts.innerHTML = ['Alternativa A','Alternativa B','Alternativa C','Alternativa D','Alternativa E'].map((t,i)=>`<button class="alt-btn"><span class="alt-letra">${String.fromCharCode(65+i)})</span><span>${t}</span></button>`).join('');
});
</script>
</body>
</html>
