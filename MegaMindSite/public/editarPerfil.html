<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Editar Perfil – MegaMind</title>

  <!-- Firebase SDKs -->
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-storage-compat.js"></script>

  <style>
    /* ── Tokens ─────────────────────────────────────── */
    :root {
      --purple:       #7B2FBE;
      --purple-dark:  #5a1f90;
      --purple-light: #9b59d0;
      --purple-bg:    #f5eeff;
      --surface:      #ffffff;
      --text:         #1a1a2e;
      --muted:        #6b7280;
      --border:       #e5d8f7;
      --error:        #dc2626;
      --success:      #16a34a;
      --radius:       14px;
      --shadow:       0 8px 32px rgba(123,47,190,.13);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: var(--purple-bg);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Sidebar (igual ao restante do MegaMind) ─────── */
    .sidebar {
      width: 240px;
      min-height: 100vh;
      background: linear-gradient(160deg, #5a1f90 0%, #7B2FBE 60%, #9b59d0 100%);
      position: fixed;
      left: 0; top: 0;
      display: flex;
      flex-direction: column;
      padding: 28px 20px;
      z-index: 100;
    }

    .sidebar-logo {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 36px;
    }

    .sidebar-logo-icon {
      width: 40px; height: 40px;
      background: rgba(255,255,255,.2);
      border-radius: 10px;
      display: grid; place-items: center;
      font-size: 20px;
    }

    .sidebar-logo span {
      color: #fff;
      font-size: 1.25rem;
      font-weight: 700;
      letter-spacing: .5px;
    }

    .nav-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 14px;
      border-radius: 10px;
      color: rgba(255,255,255,.75);
      text-decoration: none;
      font-size: .92rem;
      margin-bottom: 4px;
      transition: background .2s, color .2s;
    }

    .nav-item:hover, .nav-item.active {
      background: rgba(255,255,255,.18);
      color: #fff;
    }

    .nav-item .icon { font-size: 18px; }

    .sidebar-bottom {
      margin-top: auto;
    }

    /* ── Main ────────────────────────────────────────── */
    .main {
      margin-left: 240px;
      flex: 1;
      padding: 40px 32px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .page-header {
      width: 100%;
      max-width: 560px;
      margin-bottom: 28px;
    }

    .page-header h1 {
      font-size: 1.6rem;
      font-weight: 700;
      color: var(--text);
    }

    .page-header p {
      color: var(--muted);
      margin-top: 4px;
      font-size: .93rem;
    }

    /* ── Card ────────────────────────────────────────── */
    .card {
      background: var(--surface);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 36px 32px;
      width: 100%;
      max-width: 560px;
    }

    /* ── Avatar section ──────────────────────────────── */
    .avatar-section {
      display: flex;
      align-items: center;
      gap: 24px;
      margin-bottom: 32px;
      padding-bottom: 28px;
      border-bottom: 1px solid var(--border);
    }

    .avatar-wrapper {
      position: relative;
      flex-shrink: 0;
    }

    .avatar {
      width: 96px; height: 96px;
      border-radius: 50%;
      object-fit: cover;
      border: 3px solid var(--purple);
      background: var(--purple-bg);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.4rem;
      color: var(--purple);
      font-weight: 700;
      user-select: none;
    }

    .avatar img {
      width: 96px; height: 96px;
      border-radius: 50%;
      object-fit: cover;
    }

    .avatar-edit-btn {
      position: absolute;
      bottom: 0; right: 0;
      width: 30px; height: 30px;
      background: var(--purple);
      border: 2px solid #fff;
      border-radius: 50%;
      cursor: pointer;
      display: grid; place-items: center;
      transition: background .2s;
    }

    .avatar-edit-btn:hover { background: var(--purple-dark); }

    .avatar-edit-btn svg {
      width: 14px; height: 14px;
      fill: #fff;
    }

    .avatar-info h3 {
      font-size: 1rem;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 4px;
    }

    .avatar-info p {
      font-size: .82rem;
      color: var(--muted);
      margin-bottom: 12px;
    }

    .btn-upload {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 7px 16px;
      border: 1.5px solid var(--purple);
      border-radius: 8px;
      background: transparent;
      color: var(--purple);
      font-size: .84rem;
      font-weight: 600;
      cursor: pointer;
      transition: background .2s, color .2s;
    }

    .btn-upload:hover {
      background: var(--purple);
      color: #fff;
    }

    #fileInput { display: none; }

    /* ── Form fields ─────────────────────────────────── */
    .field { margin-bottom: 22px; }

    .field label {
      display: block;
      font-size: .85rem;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 7px;
    }

    .field input {
      width: 100%;
      padding: 11px 14px;
      border: 1.5px solid var(--border);
      border-radius: 9px;
      font-size: .95rem;
      color: var(--text);
      background: #fafafa;
      transition: border-color .2s, box-shadow .2s;
      outline: none;
    }

    .field input:focus {
      border-color: var(--purple);
      box-shadow: 0 0 0 3px rgba(123,47,190,.12);
      background: #fff;
    }

    .field input:disabled {
      color: var(--muted);
      cursor: not-allowed;
    }

    .field-hint {
      font-size: .78rem;
      color: var(--muted);
      margin-top: 5px;
    }

    /* ── Progress bar ────────────────────────────────── */
    .upload-progress {
      display: none;
      margin-top: 10px;
    }

    .upload-progress.visible { display: block; }

    .progress-bar-bg {
      height: 6px;
      background: var(--border);
      border-radius: 99px;
      overflow: hidden;
    }

    .progress-bar-fill {
      height: 100%;
      background: var(--purple);
      border-radius: 99px;
      transition: width .2s;
      width: 0%;
    }

    .progress-label {
      font-size: .78rem;
      color: var(--muted);
      margin-top: 4px;
    }

    /* ── Toast / feedback ────────────────────────────── */
    .toast {
      position: fixed;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: var(--text);
      color: #fff;
      padding: 12px 22px;
      border-radius: 10px;
      font-size: .9rem;
      box-shadow: 0 4px 20px rgba(0,0,0,.18);
      transition: transform .3s ease;
      z-index: 999;
      white-space: nowrap;
    }

    .toast.show { transform: translateX(-50%) translateY(0); }
    .toast.success { background: var(--success); }
    .toast.error   { background: var(--error); }

    /* ── Buttons ─────────────────────────────────────── */
    .actions {
      display: flex;
      gap: 12px;
      margin-top: 8px;
    }

    .btn-primary {
      flex: 1;
      padding: 12px;
      background: var(--purple);
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: .95rem;
      font-weight: 600;
      cursor: pointer;
      transition: background .2s, opacity .2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .btn-primary:hover { background: var(--purple-dark); }

    .btn-primary:disabled {
      opacity: .65;
      cursor: not-allowed;
    }

    .btn-secondary {
      padding: 12px 22px;
      background: transparent;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      font-size: .95rem;
      font-weight: 600;
      color: var(--muted);
      cursor: pointer;
      transition: border-color .2s, color .2s;
    }

    .btn-secondary:hover {
      border-color: var(--purple);
      color: var(--purple);
    }

    /* Spinner */
    .spinner {
      width: 18px; height: 18px;
      border: 2.5px solid rgba(255,255,255,.4);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin .7s linear infinite;
      display: none;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Loading overlay ─────────────────────────────── */
    #loadingOverlay {
      position: fixed; inset: 0;
      background: rgba(255,255,255,.7);
      backdrop-filter: blur(3px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 200;
    }

    #loadingOverlay.hidden { display: none; }

    .loader-ring {
      width: 48px; height: 48px;
      border: 4px solid var(--border);
      border-top-color: var(--purple);
      border-radius: 50%;
      animation: spin .8s linear infinite;
    }

    /* ── Responsive ──────────────────────────────────── */
    @media (max-width: 700px) {
      .sidebar { display: none; }
      .main { margin-left: 0; padding: 24px 16px; }
      .card { padding: 24px 18px; }
      .avatar-section { flex-direction: column; align-items: flex-start; gap: 16px; }
    }
  </style>
</head>
<body>

<!-- Loading overlay -->
<div id="loadingOverlay">
  <div class="loader-ring"></div>
</div>

<!-- Sidebar -->
<aside class="sidebar">
  <div class="sidebar-logo">
    <div class="sidebar-logo-icon">🧠</div>
    <span>MegaMind</span>
  </div>

  <nav>
    <a href="index.html"      class="nav-item"><span class="icon">🏠</span> Início</a>
    <a href="contMat.html"    class="nav-item"><span class="icon">📐</span> Matemática</a>
    <a href="redacao.html"    class="nav-item"><span class="icon">✍️</span> Redação</a>
    <a href="notas.html"      class="nav-item"><span class="icon">📋</span> Minhas Notas</a>
    <a href="editarPerfil.html" class="nav-item active"><span class="icon">👤</span> Perfil</a>
  </nav>

  <div class="sidebar-bottom">
    <a href="#" class="nav-item" id="btnLogout">
      <span class="icon">🚪</span> Sair
    </a>
  </div>
</aside>

<!-- Main content -->
<main class="main">
  <div class="page-header">
    <h1>Editar Perfil</h1>
    <p>Suas alterações ficam salvas mesmo após sair e entrar novamente.</p>
  </div>

  <div class="card">
    <!-- Avatar -->
    <div class="avatar-section">
      <div class="avatar-wrapper">
        <div class="avatar" id="avatarPreview">
          <!-- foto ou inicial do nome -->
        </div>
        <button class="avatar-edit-btn" onclick="document.getElementById('fileInput').click()" title="Trocar foto">
          <svg viewBox="0 0 24 24"><path d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zM20.71 7.04a1 1 0 0 0 0-1.41l-2.34-2.34a1 1 0 0 0-1.41 0l-1.83 1.83 3.75 3.75 1.83-1.83z"/></svg>
        </button>
      </div>

      <div class="avatar-info">
        <h3>Foto de perfil</h3>
        <p>JPG, PNG ou GIF · máx. 2 MB</p>
        <button class="btn-upload" onclick="document.getElementById('fileInput').click()">
          📁 Escolher foto
        </button>
      </div>

      <input type="file" id="fileInput" accept="image/*" />
    </div>

    <!-- Upload progress -->
    <div class="upload-progress" id="uploadProgress">
      <div class="progress-bar-bg">
        <div class="progress-bar-fill" id="progressFill"></div>
      </div>
      <p class="progress-label" id="progressLabel">Enviando… 0%</p>
    </div>

    <!-- Fields -->
    <div class="field">
      <label for="inputNome">Nome de usuário</label>
      <input type="text" id="inputNome" placeholder="Seu nome no app" maxlength="40" />
      <p class="field-hint">Será exibido no ranking e na tela inicial.</p>
    </div>

    <div class="field">
      <label for="inputEmail">E-mail</label>
      <input type="email" id="inputEmail" disabled />
      <p class="field-hint">O e-mail não pode ser alterado aqui.</p>
    </div>

    <!-- Actions -->
    <div class="actions">
      <button class="btn-secondary" id="btnCancelar">Cancelar</button>
      <button class="btn-primary" id="btnSalvar">
        <div class="spinner" id="saveSpinner"></div>
        <span id="btnSalvarText">Salvar alterações</span>
      </button>
    </div>
  </div>
</main>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
  // ── Firebase config ────────────────────────────────────────────────────────
  // 🔴 Substitua pelos seus dados reais do Firebase Console
  const firebaseConfig = {
    apiKey:            "SUA_API_KEY",
    authDomain:        "SEU_PROJECT.firebaseapp.com",
    projectId:         "SEU_PROJECT_ID",
    storageBucket:     "SEU_PROJECT.appspot.com",
    messagingSenderId: "SEU_SENDER_ID",
    appId:             "SEU_APP_ID"
  };

  firebase.initializeApp(firebaseConfig);

  const auth    = firebase.auth();
  const db      = firebase.firestore();
  const storage = firebase.storage();

  // ── Elementos ──────────────────────────────────────────────────────────────
  const avatarPreview = document.getElementById('avatarPreview');
  const inputNome     = document.getElementById('inputNome');
  const inputEmail    = document.getElementById('inputEmail');
  const fileInput     = document.getElementById('fileInput');
  const btnSalvar     = document.getElementById('btnSalvar');
  const btnCancelar   = document.getElementById('btnCancelar');
  const btnSalvarText = document.getElementById('btnSalvarText');
  const saveSpinner   = document.getElementById('saveSpinner');
  const uploadProgress = document.getElementById('uploadProgress');
  const progressFill  = document.getElementById('progressFill');
  const progressLabel = document.getElementById('progressLabel');
  const loadingOverlay = document.getElementById('loadingOverlay');

  let currentUser    = null;
  let nomeOriginal   = '';
  let fotoOriginal   = '';
  let novaFotoBase64 = null;  // preview local (antes do upload)
  let novaFotoFile   = null;  // arquivo selecionado

  // ── Auth listener ──────────────────────────────────────────────────────────
  auth.onAuthStateChanged(async (user) => {
    if (!user) {
      // Redireciona para login se não autenticado
      window.location.href = 'login.html';
      return;
    }

    currentUser = user;
    inputEmail.value = user.email || '';

    // Carrega dados do Firestore
    await carregarPerfil(user.uid);
    loadingOverlay.classList.add('hidden');
  });

  // ── Carrega perfil do Firestore ────────────────────────────────────────────
  async function carregarPerfil(uid) {
    try {
      const doc = await db.collection('usuarios').doc(uid).get();

      if (doc.exists) {
        const data = doc.data();
        nomeOriginal  = data.nome  || '';
        fotoOriginal  = data.fotoUrl || '';
        inputNome.value = nomeOriginal;
        renderAvatar(fotoOriginal, nomeOriginal);
      } else {
        // Documento ainda não existe – usa dados do Auth como fallback
        const nome = currentUser.displayName || '';
        const foto = currentUser.photoURL    || '';
        nomeOriginal = nome;
        fotoOriginal = foto;
        inputNome.value = nome;
        renderAvatar(foto, nome);
      }
    } catch (err) {
      showToast('Erro ao carregar perfil.', 'error');
      console.error(err);
    }
  }

  // ── Renderiza avatar (foto ou inicial) ────────────────────────────────────
  function renderAvatar(url, nome) {
    if (url) {
      avatarPreview.innerHTML = `<img src="${url}" alt="foto de perfil" />`;
    } else {
      const inicial = (nome || '?').charAt(0).toUpperCase();
      avatarPreview.innerHTML = inicial;
      avatarPreview.style.fontSize = '2.4rem';
    }
  }

  // ── Preview da nova foto antes do upload ──────────────────────────────────
  fileInput.addEventListener('change', () => {
    const file = fileInput.files[0];
    if (!file) return;

    if (file.size > 2 * 1024 * 1024) {
      showToast('Imagem muito grande. Máximo: 2 MB.', 'error');
      fileInput.value = '';
      return;
    }

    novaFotoFile = file;

    const reader = new FileReader();
    reader.onload = (e) => {
      novaFotoBase64 = e.target.result;
      avatarPreview.innerHTML = `<img src="${novaFotoBase64}" alt="preview" />`;
    };
    reader.readAsDataURL(file);
  });

  // ── Salvar ─────────────────────────────────────────────────────────────────
  btnSalvar.addEventListener('click', async () => {
    const novoNome = inputNome.value.trim();

    if (!novoNome) {
      showToast('O nome não pode estar vazio.', 'error');
      inputNome.focus();
      return;
    }

    setSaving(true);

    try {
      let fotoUrl = fotoOriginal;

      // 1. Faz upload da foto (se nova foto foi selecionada)
      if (novaFotoFile) {
        fotoUrl = await uploadFoto(novaFotoFile, currentUser.uid);
      }

      // 2. Salva no Firestore (cria ou atualiza o documento do usuário)
      await db.collection('usuarios').doc(currentUser.uid).set(
        {
          nome:      novoNome,
          fotoUrl:   fotoUrl,
          email:     currentUser.email,
          updatedAt: firebase.firestore.FieldValue.serverTimestamp()
        },
        { merge: true }   // merge: mantém outros campos existentes
      );

      // 3. (Opcional) Atualiza o displayName/photoURL no Firebase Auth
      await currentUser.updateProfile({
        displayName: novoNome,
        photoURL:    fotoUrl || null
      });

      // Atualiza estado local
      nomeOriginal = novoNome;
      fotoOriginal = fotoUrl;
      novaFotoFile = null;
      novaFotoBase64 = null;

      showToast('Perfil salvo com sucesso!', 'success');
    } catch (err) {
      console.error(err);
      showToast('Erro ao salvar. Tente novamente.', 'error');
    } finally {
      setSaving(false);
      uploadProgress.classList.remove('visible');
    }
  });

  // ── Upload da foto para Firebase Storage ──────────────────────────────────
  function uploadFoto(file, uid) {
    return new Promise((resolve, reject) => {
      const ext  = file.name.split('.').pop();
      const ref  = storage.ref(`perfis/${uid}/avatar.${ext}`);
      const task = ref.put(file);

      uploadProgress.classList.add('visible');

      task.on(
        'state_changed',
        (snap) => {
          const pct = Math.round((snap.bytesTransferred / snap.totalBytes) * 100);
          progressFill.style.width  = pct + '%';
          progressLabel.textContent = `Enviando… ${pct}%`;
        },
        (err) => reject(err),
        async () => {
          const url = await task.snapshot.ref.getDownloadURL();
          resolve(url);
        }
      );
    });
  }

  // ── Cancelar (restaura valores originais) ─────────────────────────────────
  btnCancelar.addEventListener('click', () => {
    inputNome.value = nomeOriginal;
    novaFotoFile    = null;
    novaFotoBase64  = null;
    fileInput.value = '';
    renderAvatar(fotoOriginal, nomeOriginal);
  });

  // ── Logout ─────────────────────────────────────────────────────────────────
  document.getElementById('btnLogout').addEventListener('click', async (e) => {
    e.preventDefault();
    await auth.signOut();
    window.location.href = 'login.html';
  });

  // ── Helpers UI ─────────────────────────────────────────────────────────────
  function setSaving(loading) {
    btnSalvar.disabled      = loading;
    saveSpinner.style.display = loading ? 'block' : 'none';
    btnSalvarText.textContent = loading ? 'Salvando…' : 'Salvar alterações';
  }

  let toastTimer;
  function showToast(msg, type = '') {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.className = `toast ${type} show`;
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => {
      el.classList.remove('show');
    }, 3000);
  }
</script>
</body>
</html>
