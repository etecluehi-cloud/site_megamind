<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Questões - Matemática - Megamind</title>
    <link rel="stylesheet" href="css/questionsStyle.css">
    <link rel="stylesheet" href="css/perfil.css">
</head>
<body>
    <main class="pagina-painel layout-simples">
        <header class="cabecalho-simples">
            <a class="botao-voltar" href="home.html">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                    <path d="M19 12H5M12 19l-7-7 7-7" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
                Voltar
            </a>
            <h1>Matemática</h1>
        </header>

        <section class="pagina-questoes">
            <section class="painel-assuntos">
                <h2>Escolha um assunto</h2>
                <div class="grade-assuntos">
                    <a class="cartao-assunto" href="questoes.html">
                        <span class="icone-assunto vermelho">2+2</span>
                        <span class="texto-assunto">
                            <strong>Matemática básica</strong>
                            <small>70 questões</small>
                            <span class="texto-progresso-assunto">2 de 70</span>
                            <span class="trilha-progresso"><span style="width: 3%;"></span></span>
                        </span>
                    </a>

                    <a class="cartao-assunto" href="#">
                        <span class="icone-assunto verde-azulado">∩</span>
                        <span class="texto-assunto">
                            <strong>Conjuntos</strong>
                            <small>25 questões</small>
                            <span class="texto-progresso-assunto">0 de 25</span>
                            <span class="trilha-progresso"><span style="width: 0%;"></span></span>
                        </span>
                    </a>

                    <a class="cartao-assunto" href="#">
                        <span class="icone-assunto verde">1,3,9</span>
                        <span class="texto-assunto">
                            <strong>Progressões</strong>
                            <small>15 questões</small>
                            <span class="texto-progresso-assunto">1 de 15</span>
                            <span class="trilha-progresso"><span style="width: 7%;"></span></span>
                        </span>
                    </a>

                    <a class="cartao-assunto" href="#">
                        <span class="icone-assunto azul">⬡</span>
                        <span class="texto-assunto">
                            <strong>Geometria plana</strong>
                            <small>30 questões</small>
                            <span class="texto-progresso-assunto">0 de 30</span>
                            <span class="trilha-progresso"><span style="width: 0%;"></span></span>
                        </span>
                    </a>

                    <a class="cartao-assunto" href="#">
                        <span class="icone-assunto amarelo">○</span>
                        <span class="texto-assunto">
                            <strong>Geometria de posição</strong>
                            <small>7 questões</small>
                            <span class="texto-progresso-assunto">0 de 7</span>
                            <span class="trilha-progresso"><span style="width: 0%;"></span></span>
                        </span>
                    </a>

                    <a class="cartao-assunto" href="#">
                        <span class="icone-assunto rosa">△</span>
                        <span class="texto-assunto">
                            <strong>Geometria espacial</strong>
                            <small>25 questões</small>
                            <span class="texto-progresso-assunto">0 de 25</span>
                            <span class="trilha-progresso"><span style="width: 0%;"></span></span>
                        </span>
                    </a>
                </div>
            </section>
        </section>
    </main>
    <div id="mm-toast" role="status" aria-live="polite"></div>
    <script src="js/perfil.js"></script>
</body>
</html>
