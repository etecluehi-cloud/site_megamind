<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Avalie-nos - Megamind</title>
    <link rel="stylesheet" href="css/otherStyle.css">
    <link rel="stylesheet" href="css/perfil.css">
</head>
<body>
    <main class="pagina-painel layout-simples">
        <!-- Cabeçalho da página -->
        <header class="cabecalho-simples">
            <a class="botao-voltar" href="home.html">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                    <path d="M19 12H5M12 19l-7-7 7-7" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
                Voltar
            </a>
            <h1>Avalie-nos</h1>
        </header>

        <!-- Seção de Conteúdo -->
        <section class="area-conteudo" style="max-width: 600px;">
            <div style="padding: 30px; background: #fbf9ff; border-radius: 8px;">
                <h3 style="color: #333; text-align: center; margin-bottom: 30px;">Sua opinião é importante!</h3>
                
                <div style="margin-bottom: 20px;">
                    <label style="display: block; margin-bottom: 8px; color: #333; font-weight: 500;">Como você avalia a plataforma?</label>
                    <div style="display: flex; gap: 10px; justify-content: center;">
                        <button style="width: 50px; height: 50px; border: 2px solid #ddd; background: white; border-radius: 50%; cursor: pointer; font-size: 24px;">⭐</button>
                        <button style="width: 50px; height: 50px; border: 2px solid #ddd; background: white; border-radius: 50%; cursor: pointer; font-size: 24px;">⭐</button>
                        <button style="width: 50px; height: 50px; border: 2px solid #ddd; background: white; border-radius: 50%; cursor: pointer; font-size: 24px;">⭐</button>
                        <button style="width: 50px; height: 50px; border: 2px solid #ddd; background: white; border-radius: 50%; cursor: pointer; font-size: 24px;">⭐</button>
                        <button style="width: 50px; height: 50px; border: 2px solid #ddd; background: white; border-radius: 50%; cursor: pointer; font-size: 24px;">⭐</button>
                    </div>
                </div>

                <div style="margin-bottom: 20px;">
                    <label style="display: block; margin-bottom: 8px; color: #333; font-weight: 500;">Qual aspecto você gostaria de melhorar?</label>
                    <select style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 6px; font-size: 14px;">
                        <option>Selecione uma opção</option>
                        <option>Conteúdo</option>
                        <option>Interface</option>
                        <option>Desempenho</option>
                        <option>Suporte</option>
                        <option>Outro</option>
                    </select>
                </div>

                <div style="margin-bottom: 20px;">
                    <label style="display: block; margin-bottom: 8px; color: #333; font-weight: 500;">Deixe seu comentário (opcional):</label>
                    <textarea style="width: 100%; height: 120px; padding: 10px; border: 1px solid #ddd; border-radius: 6px; font-family: Arial; resize: vertical;" placeholder="Sua opinião..."></textarea>
                </div>

                <button class="botao-enviar" style="width: 100%;">Enviar avaliação</button>
            </div>
        </section>
    </main>
    <div id="mm-toast" role="status" aria-live="polite"></div>
    <script src="js/perfil.js"></script>
</body>
</html>
