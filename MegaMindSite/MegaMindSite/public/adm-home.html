<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Administrativo - MegaMind</title>
    <link rel="stylesheet" href="css/homeStyle.css">
    <link rel="stylesheet" href="css/admStyle.css">
</head>
<body class="inicio">
    <main class="pagina-painel">
        <div class="estrutura-painel">
            <!-- Menu lateral principal -->
            <aside class="barra-lateral-painel" aria-label="Menu lateral administrativo">
                <nav class="navegacao-lateral">
                    <div class="admin-header">
                        <h2>Painel Admin</h2>
                    </div>
                    
                    <a class="link-lateral ativo" href="adm-home.html" aria-current="page">
                        <span class="icone-navegacao">
                            <svg viewBox="0 0 24 24" aria-hidden="true">
                                <path d="M4 11.2 12 5l8 6.2V19a1 1 0 0 1-1 1h-4.5v-5h-5v5H5a1 1 0 0 1-1-1z" fill="currentColor"/>
                            </svg>
                        </span>
                        Dashboard
                    </a>
                    
                    <a class="link-lateral" href="adm-cadastrar.html">
                        <span class="icone-navegacao">
                            <svg viewBox="0 0 24 24" aria-hidden="true">
                                <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm5 11h-4v4h-2v-4H7v-2h4V7h2v4h4v2z" fill="currentColor"/>
                            </svg>
                        </span>
                        Cadastrar Adms
                    </a>
                    
                    <a class="link-lateral" href="adm-gerenciar-fale.html">
                        <span class="icone-navegacao">
                            <svg viewBox="0 0 24 24" aria-hidden="true">
                                <path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm-2 12H6v-2h12v2zm0-3H6V9h12v2zm0-3H6V6h12v2z" fill="currentColor"/>
                            </svg>
                        </span>
                        Gerenciar Fale Conosco
                    </a>
                    
                    <a class="link-lateral" href="adm-gerenciar-dashboard.html">
                        <span class="icone-navegacao">
                            <svg viewBox="0 0 24 24" aria-hidden="true">
                                <path d="M3 13h2v8H3zm4-8h2v16H7zm4-2h2v18h-2zm4 4h2v14h-2zm4-2h2v16h-2z" fill="currentColor"/>
                            </svg>
                        </span>
                        Gerenciar Dashboard
                    </a>
                </nav>

                <a class="btn-logout" href="index.html">
                    <span class="icone-logout">
                        <svg viewBox="0 0 24 24" aria-hidden="true">
                            <path d="M17 7l-1.41 1.41L18.17 11H8v2h10.17l-2.58 2.58L17 17l5-5zM4 5h8V3H4c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h8v-2H4V5z" fill="currentColor"/>
                        </svg>
                    </span>
                    Sair
                </a>
            </aside>

            <!-- Conteúdo principal da página -->
            <section class="conteudo-painel">

                <!-- Banner de boas-vindas -->
                <section class="banner-boas-vindas" aria-label="Boas-vindas administrativo">
                    <div class="avatar-banner">
                        <img src="img/logo.png" alt="Logo do Megamind">
                    </div>
                    <div class="texto-banner">
                        <h1>Bem-vindo(a), Administrador<span id="saudacao" aria-hidden="true">👋</span>!</h1>
                        <p class="subtitulo-banner">Gerencie o sistema MegaMind</p>
                    </div>
                </section>

                <!-- Cards do dashboard -->
                <section class="cards-dashboard" aria-label="Resumo administrativo">
                    
                    <div class="card-admin">
                        <div class="icone-card">
                            <svg viewBox="0 0 24 24">
                                <path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z" fill="currentColor"/>
                            </svg>
                        </div>
                        <div class="info-card">
                            <h3>Administradores</h3>
                            <p id="count-adms" class="numero-card">0</p>
                        </div>
                    </div>

                    <div class="card-admin">
                        <div class="icone-card">
                            <svg viewBox="0 0 24 24">
                                <path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm-2 12H6v-2h12v2zm0-3H6V9h12v2zm0-3H6V6h12v2z" fill="currentColor"/>
                            </svg>
                        </div>
                        <div class="info-card">
                            <h3>Mensagens (Fale Conosco)</h3>
                            <p id="count-messages" class="numero-card">0</p>
                        </div>
                    </div>

                    <div class="card-admin">
                        <div class="icone-card">
                            <svg viewBox="0 0 24 24">
                                <path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zM9 17H7v-7h2V17zm4 0h-2V7h2V17zm4 0h-2v-4h2V17z" fill="currentColor"/>
                            </svg>
                        </div>
                        <div class="info-card">
                            <h3>Estatísticas</h3>
                            <p class="numero-card">Ativas</p>
                        </div>
                    </div>

                </section>

                <!-- Atalhos rápidos -->
                <section class="atalhos-admin" aria-label="Atalhos rápidos">
                    <h2>Ações Rápidas</h2>
                    <div class="grid-atalhos">
                        <a href="adm-cadastrar.html" class="atalho-btn">
                            <span class="icone-atalho">✚</span>
                            <span>Novo Admin</span>
                        </a>
                        <a href="adm-gerenciar-fale.html" class="atalho-btn">
                            <span class="icone-atalho">✉</span>
                            <span>Ver Mensagens</span>
                        </a>
                        <a href="adm-gerenciar-dashboard.html" class="atalho-btn">
                            <span class="icone-atalho">📊</span>
                            <span>Gerenciar</span>
                        </a>
                    </div>
                </section>

            </section>

        </div>
    </main>

</body>
</html>
