<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Questões - Português - Megamind</title>
    <link rel="stylesheet" href="css/questionsStyle.css">
    <link rel="stylesheet" href="css/perfil.css">
</head>
<body>
    <main class="pagina-painel layout-simples">
        <header class="cabecalho-simples">
            <a class="botao-voltar" href="home.html">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                    <path d="M19 12H5M12 19l-7-7 7-7" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
                Voltar
            </a>
            <h1>Português</h1>
        </header>

        <section class="pagina-questoes">
            <section class="painel-assuntos">
                <h2>Escolha um assunto</h2>
                <div class="grade-assuntos">
                    <a class="cartao-assunto" href="#">
                        <span class="icone-assunto vermelho">A</span>
                        <span class="texto-assunto">
                            <strong>Ortografia</strong>
                            <small>40 questões</small>
                            <span class="texto-progresso-assunto">8 de 40</span>
                            <span class="trilha-progresso"><span style="width: 20%;"></span></span>
                        </span>
                    </a>

                    <a class="cartao-assunto" href="#">
                        <span class="icone-assunto roxo">´</span>
                        <span class="texto-assunto">
                            <strong>Acentuação</strong>
                            <small>32 questões</small>
                            <span class="texto-progresso-assunto">5 de 32</span>
                            <span class="trilha-progresso"><span style="width: 16%;"></span></span>
                        </span>
                    </a>

                    <a class="cartao-assunto" href="#">
                        <span class="icone-assunto verde">ABC</span>
                        <span class="texto-assunto">
                            <strong>Gramática</strong>
                            <small>55 questões</small>
                            <span class="texto-progresso-assunto">11 de 55</span>
                            <span class="trilha-progresso"><span style="width: 20%;"></span></span>
                        </span>
                    </a>

                    <a class="cartao-assunto" href="#">
                        <span class="icone-assunto azul">📖</span>
                        <span class="texto-assunto">
                            <strong>Interpretação de textos</strong>
                            <small>30 questões</small>
                            <span class="texto-progresso-assunto">3 de 30</span>
                            <span class="trilha-progresso"><span style="width: 10%;"></span></span>
                        </span>
                    </a>

                    <a class="cartao-assunto" href="#">
                        <span class="icone-assunto amarelo">✎</span>
                        <span class="texto-assunto">
                            <strong>Literatura</strong>
                            <small>24 questões</small>
                            <span class="texto-progresso-assunto">0 de 24</span>
                            <span class="trilha-progresso"><span style="width: 0%;"></span></span>
                        </span>
                    </a>

                    <a class="cartao-assunto" href="#">
                        <span class="icone-assunto verde-azulado">≈</span>
                        <span class="texto-assunto">
                            <strong>Fonética e fonologia</strong>
                            <small>18 questões</small>
                            <span class="texto-progresso-assunto">2 de 18</span>
                            <span class="trilha-progresso"><span style="width: 11%;"></span></span>
                        </span>
                    </a>
                </div>
            </section>
        </section>
    </main>
    <div id="mm-toast" role="status" aria-live="polite"></div>
    <script src="js/perfil.js"></script>
</body>
</html>
